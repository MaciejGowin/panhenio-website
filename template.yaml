AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API

Parameters:
  Project:
    Type: String
  Environment:
    Type: String

Resources:
  WebsiteFunction:
    Type: 'AWS::Serverless::Function'
    Properties:
      FunctionName: !Sub '${Project}-WEBSITE-${Environment}'
      AutoPublishAlias: live
      CodeUri: .
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Timeout: 5
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambda_ReadOnlyAccess
      Tracing: Active
    Metadata:
      BuildMethod: makefile

  WebsiteIntegration:
    Type: 'AWS::ApiGatewayV2::Integration'
    Properties:
      ApiId:
        Fn::ImportValue: !Sub '${Project}-${Environment}::ApiGateway::API:Id'
      Description: API Lambda Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Function}/invocations'
        - Function: !GetAtt WebsiteFunctionAliaslive.AliasArn
      RequestParameters:
        "overwrite:path": "$request.path"
      PayloadFormatVersion: '2.0'

  WebsiteRoute:
    Type: 'AWS::ApiGatewayV2::Route'
    Properties:
      ApiId:
        Fn::ImportValue: !Sub '${Project}-${Environment}::ApiGateway::API:Id'
      RouteKey: ANY /{proxy+}
      Target: !Sub "integrations/${WebsiteIntegration}"

  ApiGatewayFunctionPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref WebsiteFunctionAliaslive
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub
        - "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*"
        - ApiGateway:
            Fn::ImportValue: !Sub '${Project}-${Environment}::ApiGateway::API:Id'
